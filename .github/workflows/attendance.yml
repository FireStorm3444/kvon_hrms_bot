name: HRMS Automated Morning Check-In

on:
  schedule:
    # CRON operates in UTC. 3:30 AM UTC is exactly 9:00 AM IST.
    # This runs Monday (1) through Friday (5).
    - cron: '30 3 * * 1-5'
  
  # This line allows you to manually click a "Run workflow" button on GitHub for testing
  workflow_dispatch: 

jobs:
  execute-checkin:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3

    - name: Run HRMS Check-In
      env:
        # We securely map the GitHub Secrets back into environment variables
        KVON_API_URL: ${{ secrets.KVON_API_URL }}
        OFFICE_LAT: ${{ secrets.OFFICE_LAT }}
        OFFICE_LONG: ${{ secrets.OFFICE_LONG }}
        KVON_EMP_ID: ${{ secrets.KVON_EMP_ID }}
        KVON_PASSWORD: ${{ secrets.KVON_PASSWORD }}
        KVON_EMAIL: ${{ secrets.KVON_EMAIL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
      # The script will sleep for a random time (0-15 mins) before firing
      run: python main.py --action check-in --automated