name: HRMS Automated Morning Check-In

on:
  # This line allows you to manually click a "Run workflow" button on GitHub for testing
  workflow_dispatch: 

jobs:
  execute-checkin:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Camouflage Runner Network (Cloudflare WARP)
      run: |
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install cloudflare-warp -y
        warp-cli --accept-tos register
        warp-cli --accept-tos connect
        
        # Give the daemon 5 seconds to establish the secure tunnel
        sleep 5
        
        # Verify the traffic is successfully routing through Cloudflare
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep warp

    - name: Run HRMS Check-In with Job-Level Retries
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_on: error
        command: python main.py --action check-in
      env:
        KVON_API_URL: ${{ secrets.KVON_API_URL }}
        OFFICE_LAT: ${{ secrets.OFFICE_LAT }}
        OFFICE_LONG: ${{ secrets.OFFICE_LONG }}
        KVON_EMP_ID: ${{ secrets.KVON_EMP_ID }}
        KVON_PASSWORD: ${{ secrets.KVON_PASSWORD }}
        KVON_EMAIL: ${{ secrets.KVON_EMAIL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}